---
# Default variables for applications role

# Web browsers
web_browsers: []  # Options: firefox, google-chrome, chromium, brave, vivaldi, edge

# Default browser to set
default_browser: firefox

# Communication applications
communication_apps: []  # Options: slack, discord, teams, zoom, signal, telegram

# Productivity applications
install_libreoffice: true
productivity_apps: []  # Options: obsidian, notion, thunderbird, evolution, joplin

# Multimedia applications
multimedia_apps:
  - vlc
  - gimp

# Cloud storage clients
cloud_storage: []  # Options: dropbox, insync, onedrive, nextcloud

# Privacy and security applications
privacy_security_apps: []  # Options: tor-browser, element, wire, jami, session, veracrypt, cryptomator, onionshare, mat2, wireshark, gufw, opensnitch, bleachbit, stacer, protonvpn

# Essential utilities to install
essential_utilities:
  - curl
  - wget
  - htop
  - neofetch
  - tree
  - ncdu
  - unzip
  - p7zip-full
  - p7zip-rar
  - rar
  - unrar
  - build-essential
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

# System utilities
system_utilities:
  - gparted
  - gnome-disk-utility
  - timeshift
  - deja-dup
  - bleachbit
  - synaptic
  - gnome-tweaks
  - dconf-editor

# Archive managers
archive_managers:
  - file-roller
  - ark

# PDF tools
pdf_tools:
  - okular
  - evince
  - pdftk
  - qpdf

# Screenshot tools
screenshot_tools:
  - flameshot
  - gnome-screenshot

# Clipboard managers
clipboard_managers:
  - copyq
  - parcellite
